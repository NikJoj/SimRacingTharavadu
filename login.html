<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Sim Racing Tharavadu</title>
  <link rel="icon" type="image/png" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255,255,255,0.03) 2px,
          rgba(255,255,255,0.03) 4px
        );
      pointer-events: none;
    }

    .login-container {
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 1;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo img {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
    }

    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    .login-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--red);
      background: rgba(255, 255, 255, 0.08);
    }

    .login-btn {
      width: 100%;
      padding: 1rem;
      background: var(--red);
      color: var(--text);
      border: none;
      border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }

    .login-btn:hover:not(:disabled) {
      background: #c41e3a;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: var(--red);
      padding: 0.875rem 1rem;
      border-radius: 4px;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .back-link a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: var(--red);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <img src="srtLogo.png" alt="SRT Logo">
      <div class="login-title">Admin Access</div>
      <div class="login-subtitle">Sim Racing Tharavadu</div>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        Login to Dashboard
      </button>
    </form>

    <div class="back-link">
      <a href="index.html">← Back to Main Site</a>
    </div>
  </div>

  <script>
    // Check if already logged in
    const token = localStorage.getItem('srt_admin_token');
    if (token) {
      // Validate token
      fetch('/api/admin-auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'validate', token })
      })
      .then(res => res.json())
      .then(data => {
        if (data.valid) {
          window.location.href = 'admin.html';
        }
      })
      .catch(() => {
        // Token invalid, stay on login page
        localStorage.removeItem('srt_admin_token');
      });
    }

    function showError(message) {
      const errorEl = document.getElementById('error-msg');
      errorEl.textContent = message;
      errorEl.classList.add('show');
      setTimeout(() => errorEl.classList.remove('show'), 5000);
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const btn = document.getElementById('login-btn');
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // Disable button and show loading
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span> Authenticating...';

      try {
        const response = await fetch('/api/admin-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Store token
          localStorage.setItem('srt_admin_token', data.token);
          localStorage.setItem('srt_admin_username', data.username);
          localStorage.setItem('srt_admin_expires', Date.now() + (data.expiresIn * 1000));

          // Redirect to admin dashboard
          window.location.href = 'admin.html';
        } else {
          showError(data.error || 'Invalid credentials');
          btn.disabled = false;
          btn.textContent = 'Login to Dashboard';
        }
      } catch (error) {
        showError('Login failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Login to Dashboard';
      }
    }
  </script>
</body>
</html>
